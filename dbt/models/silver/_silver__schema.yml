version: 2

models:
  - name: silver_posts
    description: >
      Structured post data extracted from bronze raw payloads.
      Bronze → Silver transformation: extracts fields from JSON raw_payload,
      joins with search_requests to include campaign keyword.
      This is the first Silver model in the strict medallion lineage.
    meta:
      medallion_layer: silver
      screen: Post Explorer
    columns:
      - name: id
        description: "Primary key UUID"
        tests:
          - unique
          - not_null
      - name: bronze_post_id
        description: "FK to bronze.bronze_posts — traceability to raw data"
        tests:
          - not_null
      - name: search_request_id
        description: "FK to bronze.search_requests — campaign identifier"
        tests:
          - not_null
      - name: keyword
        description: "Search keyword from the original crawl request (via JOIN with search_requests)"
        tests:
          - not_null
      - name: platform
        description: "Source platform (twitter, etc.)"
      - name: platform_id
        description: "Platform-specific post ID"
      - name: author_handle
        description: "Author handle/username"
      - name: author_name
        description: "Author display name (extracted from raw_payload JSON)"
      - name: post_text
        description: "Post content text (extracted from raw_payload JSON)"
      - name: posted_at
        description: "Original post creation timestamp (extracted from raw_payload JSON)"
      - name: like_count
        description: "Number of likes (extracted from raw_payload public_metrics)"
      - name: share_count
        description: "Number of shares/retweets (extracted from raw_payload public_metrics)"
      - name: reply_count
        description: "Number of replies (extracted from raw_payload public_metrics)"
      - name: view_count
        description: "Number of views/impressions (extracted from raw_payload public_metrics)"
      - name: post_url
        description: "URL to original post"
      - name: is_retweet
        description: "Whether this is a retweet/repost"
      - name: created_at
        description: "Silver record creation timestamp"

  - name: silver_ai_enrichment
    description: >
      AI enrichment results for silver posts — sentiment, topics, language detection.
      In production, generated by the Python AI pipeline (HuggingFace, KeyBERT, Lingua).
      Depends on silver_posts: the AI process enriches posts from the Silver layer.
    meta:
      medallion_layer: silver
      screen: Post Explorer
    columns:
      - name: id
        description: "Primary key UUID"
        tests:
          - unique
          - not_null
      - name: silver_post_id
        description: "FK to silver_posts"
        tests:
          - not_null
      - name: ai_version
        description: "AI model version used for enrichment"
      - name: hashtags
        description: "Detected hashtags (VARCHAR[])"
      - name: mentions
        description: "Detected mentions (VARCHAR[])"
      - name: language
        description: "Detected language code (ISO 639-1)"
      - name: topic_label
        description: "Primary topic classification label"
      - name: topic_confidence
        description: "Topic classification confidence (0-1)"
      - name: reach_estimate
        description: "Estimated reach/impressions"
      - name: sentiment
        description: "Sentiment label: positive, negative, neutral"
      - name: sentiment_confidence
        description: "Sentiment confidence score (0-1)"
      - name: metadata_model_name
        description: "Model used for metadata extraction"
      - name: metadata_model_version
        description: "Version of metadata extraction model"
      - name: sentiment_model_name
        description: "Model used for sentiment analysis"
      - name: sentiment_model_version
        description: "Version of sentiment analysis model"
      - name: created_at
        description: "Record creation timestamp"
