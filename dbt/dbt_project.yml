name: socialpulse
version: "1.0.0"
config-version: 2

profile: socialpulse

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  socialpulse:
    silver:
      +schema: dbt_silver
      +materialized: view
      +meta:
        medallion_layer: silver
    gold:
      +schema: dbt_gold
      +materialized: view
      +meta:
        medallion_layer: gold
