apiVersion: v1
kind: Service
metadata:
  name: socialpulse-api
  namespace: socialpulse
  labels:
    app.kubernetes.io/name: socialpulse
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: socialpulse
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
