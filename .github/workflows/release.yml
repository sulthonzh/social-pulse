name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          package-name: socialpulse

  deploy:
    name: Deploy to GHCR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/social-pulse:latest
            ghcr.io/${{ github.repository_owner }}/social-pulse:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/social-pulse-api:latest
            ghcr.io/${{ github.repository_owner }}/social-pulse-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
